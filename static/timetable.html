<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timetable</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f4f4f4;
            position: sticky;
            top: 0;
        }
        .current-row {
            background-color: #ffd600;
            font-weight: bold;
        }
        .group-header {
            background-color: #e0e0e0;
            font-weight: bold;
            font-size: 1.1em;
        }
        .day-header td {
            background-color: #336;
            color: #fff;
            font-weight: bold;
            font-size: 1.1em;
            padding: 10px 12px;
        }
    </style>
</head>
<body>
    <h1>Timetable</h1>
    <a href="/" style="position:fixed;bottom:10px;right:16px;font-size:0.9em;color:#888;text-decoration:none;">← Countdown</a>
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Group</th>
                <th>Slot</th>
                <th>Phase</th>
                <th>Duration</th>
            </tr>
        </thead>
        <tbody id="data-table-body">
        </tbody>
    </table>
    <script>
        function formatDate(isoStr) {
            if (!isoStr) return '';
            var d = new Date(isoStr);
            var today = new Date();
            today.setHours(0,0,0,0);
            var tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            var dateStr = d.toLocaleDateString('de-DE', {weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit'});
            if (d.getTime() === today.getTime()) return dateStr + '  (Today)';
            if (d.getTime() === tomorrow.getTime()) return dateStr + '  (Tomorrow)';
            return dateStr;
        }

        function fetchData() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/get_data', true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            if (Array.isArray(data)) {
                                var tableBody = document.getElementById('data-table-body');
                                tableBody.innerHTML = '';
                                var lastDate = null;

                                data.forEach(function(row) {
                                    // Insert day header when date changes
                                    if (row.date && row.date !== lastDate) {
                                        lastDate = row.date;
                                        var headerTr = document.createElement('tr');
                                        headerTr.classList.add('day-header');
                                        var headerTd = document.createElement('td');
                                        headerTd.colSpan = 5;
                                        headerTd.textContent = formatDate(row.date);
                                        headerTr.appendChild(headerTd);
                                        tableBody.appendChild(headerTr);
                                    }

                                    var tr = document.createElement('tr');
                                    if (row.current) {
                                        tr.classList.add('current-row');
                                    }

                                    var timeTd = document.createElement('td');
                                    timeTd.textContent = row.hour + ':' + String(row.minute).padStart(2, '0');
                                    tr.appendChild(timeTd);

                                    var groupTd = document.createElement('td');
                                    groupTd.textContent = row.group || '';
                                    tr.appendChild(groupTd);

                                    var slotTd = document.createElement('td');
                                    slotTd.textContent = row.slot_index != null ? row.slot_index + 1 : '';
                                    tr.appendChild(slotTd);

                                    var phaseTd = document.createElement('td');
                                    phaseTd.textContent = row.phase;
                                    tr.appendChild(phaseTd);

                                    var durationTd = document.createElement('td');
                                    durationTd.textContent = row.duration_min ? row.duration_min + ' min' : '';
                                    tr.appendChild(durationTd);

                                    tableBody.appendChild(tr);
                                });
                            }
                        } catch (e) {
                            console.error('Error parsing JSON:', e);
                        }
                    }
                }
            };
            xhr.send();
        }

        setInterval(fetchData, 5000);
        window.onload = fetchData;
    </script>
</body>
</html>
