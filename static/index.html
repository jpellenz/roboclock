<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.7">
    <title>Countdown Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #e0e0e0;
            text-align: center;
        }
        header {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
        }
        img {
            max-height: 200px;
        }
        #qrcode {
            display: none;
            width: 150px;
            height: 150px;
        }
        h1 {
            font-size: 4em;
            margin-bottom: 20px;
        }
        #countdown {
            font-weight: bold;
            font-size: 28em;
            margin-top: 20px;
        }
        #current_phase {
            display: none;
        }
        #phase_boxes {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .phase-box {
            padding: 18px 32px;
            font-size: 2.2em;
            font-weight: bold;
            border: 4px solid #333;
            border-radius: 12px;
            background-color: #bbb;
            color: #333;
            transition: background-color 0.3s ease;
            text-align: center;
        }
        .phase-box.active {
            background-color: #ffd600;
            color: #000;
            border-color: #b8960c;
        }
        .phase-box .duration {
            font-size: 0.8em;
            font-weight: normal;
            margin-top: 4px;
        }
        #next_phase {
            display: none;
        }
        #remaining_mission_time {
            font-size: 3em;
            margin-top: 15px;
        }
        #play_audio_button {
            display: none;
            margin-top: 20px;
            font-size: 2em;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let qrcode;
        let currentAudioFile = null;
        let audioElement = null;
        let lastPhase = null;

        function startCountdown() {
            // Audio-Element erstellen
            audioElement = new Audio();
            
            function updateCountdown() {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', '/get_countdown', true);
                xhr.onload = function () {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        const countdownSeconds = response.countdown_seconds;
                        const currentPhase = response.current_phase;
                        const nextPhase = response.next_phase;
                        const remainingMissionTimeSeconds = response.remaining_mission_time_seconds;
                        const serverHour = response.server_hour;
                        const serverMinute = response.server_minute;
                        const serverSecond = response.server_second;
                        const serverIp = response.server_ip;
                        const fullUrl = `http://${serverIp}:5001/static/index.html`;
                        const nextTeamTime = response.next_team_time;

                        // Convert countdown seconds to hours, minutes, and seconds
                        const hours = Math.floor(countdownSeconds / 3600);
                        const minutes = Math.floor((countdownSeconds % 3600) / 60);
                        const seconds = countdownSeconds % 60;

                        // Convert remaining mission time seconds to minutes and seconds
                        const remainingMinutes = Math.floor(remainingMissionTimeSeconds / 60);
                        const remainingSeconds = remainingMissionTimeSeconds % 60;

                        // Display the countdown
                        const countdownDisplay = hours > 0 ? `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}` : `${minutes}:${seconds.toString().padStart(2, '0')}`;
                        document.getElementById('countdown').innerText = countdownDisplay;

                        document.getElementById('current_phase').innerText = `${currentPhase}`;

                        // Render phase boxes
                        const phaseBoxes = response.phase_boxes || [];
                        const phaseBoxesContainer = document.getElementById('phase_boxes');
                        if (phaseBoxes.length > 0) {
                            phaseBoxesContainer.style.display = 'flex';
                            phaseBoxesContainer.innerHTML = phaseBoxes.map(box => {
                                const dur = box.duration_min ? `<div class="duration">${box.duration_min} min</div>` : '';
                                return `<div class="phase-box${box.active ? ' active' : ''}">${box.phase}${dur}</div>`;
                            }).join('');
                        } else {
                            phaseBoxesContainer.style.display = 'none';
                            phaseBoxesContainer.innerHTML = '';
                        }

                        document.getElementById('next_phase').innerText = `Next task: ${nextPhase}`;
                        const remainingMissionTimeText = remainingMinutes === 0 ? `${remainingSeconds} s` : `${remainingMinutes} min`;
                        document.getElementById('remaining_mission_time').innerText = `(It's ${serverHour}:${serverMinute.toString().padStart(2, '0')}, next team starts in ${remainingMissionTimeText} at ${nextTeamTime})`;

                        // Update the QR code
                        document.getElementById('server_ip').innerText = `Server IP: ${serverIp}`;
                        if (qrcode) {
                            qrcode.clear();
                            qrcode.makeCode(fullUrl);
                        } else {
                            qrcode = new QRCode(document.getElementById("qrcode"), {
                                text: fullUrl,
                                width: 200,
                                height: 200
                            });
                        }
                        
                        // Wenn sich die Phase geändert hat, Audio aktualisieren
                        if (lastPhase !== currentPhase) {
                            lastPhase = currentPhase;
                            checkCurrentAudio();
                        }
                    }
                };
                xhr.send();
            }
            
            function checkCurrentAudio() {
                const audioXhr = new XMLHttpRequest();
                audioXhr.open('GET', '/get_current_audio', true);
                audioXhr.onload = function () {
                    if (audioXhr.status === 200) {
                        const audioResponse = JSON.parse(audioXhr.responseText);
                        const audioFile = audioResponse.audio_file;
                        
                        // Nur abspielen, wenn eine Audiodatei verfügbar ist und sie sich von der aktuellen unterscheidet
                        if (audioFile && audioFile !== currentAudioFile) {
                            currentAudioFile = audioFile;
                            playAudio(audioFile);
                        }
                    }
                };
                audioXhr.send();
            }
            
            function playAudio(filename) {
                if (!filename) return;
                
                // Erst den Gong abspielen, dann die eigentliche Audiodatei
                const playGong = function() {
                    audioElement = new Audio();
                    audioElement.src = '/sounds/gong.mp3';
                    
                    // Nach dem Abspielen des Gongs die Hauptdatei abspielen
                    audioElement.onended = function() {
                        playMainAudio();
                    };
                    
                    audioElement.play().catch(e => {
                        console.log('Automatisches Abspielen des Gongs fehlgeschlagen. Benutzerinteraktion erforderlich:', e);
                        document.getElementById('play_audio_button').style.display = 'block';
                    });
                };
                
                // Hauptaudiodatei abspielen
                const playMainAudio = function() {
                    audioElement = new Audio();
                    audioElement.src = `/sounds/${filename}`;
                    audioElement.play().catch(e => {
                        console.log('Automatisches Abspielen fehlgeschlagen. Benutzerinteraktion erforderlich:', e);
                        document.getElementById('play_audio_button').style.display = 'block';
                    });
                };
                
                // Starte mit dem Gong
                playGong();
            }
            
            // Initiale Updates
            updateCountdown();
            checkCurrentAudio();
            
            // Regelmäßige Updates
            const countdownInterval = setInterval(updateCountdown, 1000);
            const audioCheckInterval = setInterval(checkCurrentAudio, 5000);
        }
        
        // Funktion zum manuellen Abspielen des aktuellen Audios (falls automatisches Abspielen blockiert wird)
        function manualPlayAudio() {
            if (audioElement && audioElement.src) {
                audioElement.play().then(() => {
                    document.getElementById('play_audio_button').style.display = 'none';
                }).catch(e => {
                    console.error('Fehler beim Abspielen des Audios:', e);
                });
            }
        }
    </script>
</head>
<body onload="startCountdown()">
    <header>
        <img src="static/RCGermany_LOGO_V2-3.png" alt="RoboCup GO 2025 Logo">
        <div id="qrcode"></div>
        <img src="static/testmethodseal.png" alt="Test Method Seal">
    </header>
    <h1>RoboCup Rescue</h1>
    <div id="current_phase"></div>
    <div id="phase_boxes"></div>
    <div id="countdown">Loading...</div>
    <div id="next_phase">Loading...</div>
    <div id="remaining_mission_time">Loading...</div>
    <div id="server_ip">Loading...</div>
    <a href="/static/timetable.html" style="position:fixed;bottom:10px;right:16px;font-size:0.9em;color:#888;text-decoration:none;">Timetable</a>
    <button id="play_audio_button" onclick="manualPlayAudio()">Play Audio</button>
</body>
</html>
